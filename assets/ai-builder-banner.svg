<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" preserveAspectRatio="xMidYMid meet" role="img" aria-label="AI-Powered Automation Builder">
  <defs>
    <pattern id="grid" width="36" height="36" patternUnits="userSpaceOnUse">
      <path d="M 36 0 L 0 0 0 36" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="160" fill="url(#bg)"/>
  <rect width="900" height="160" fill="url(#grid)" opacity="0.6"/>

  <!-- Corner brackets: TL/BR cyan, TR/BL magenta -->
  <g stroke-width="2.5" fill="none" filter="url(#glow)">
    <path d="M 20 20 L 60 20 M 20 20 L 20 60" stroke="#06b6d4"/>
    <path d="M 880 20 L 840 20 M 880 20 L 880 60" stroke="#ec4899"/>
    <path d="M 20 140 L 60 140 M 20 140 L 20 100" stroke="#ec4899"/>
    <path d="M 880 140 L 840 140 M 880 140 L 880 100" stroke="#06b6d4"/>
  </g>

  <!-- Title -->
  <text x="450" y="78" text-anchor="middle" font-family="'JetBrains Mono', 'Consolas', 'Menlo', 'Courier New', monospace" font-size="34" font-weight="700" fill="url(#title)" filter="url(#glow)">AI-POWERED AUTOMATION BUILDER</text>

  <!-- Divider -->
  <line x1="160" y1="98" x2="740" y2="98" stroke="#312e81" stroke-width="1"/>

  <!-- Terminal-style tag row -->
  <g font-family="'JetBrains Mono', 'Consolas', 'Menlo', 'Courier New', monospace" font-size="13">
    <text x="180" y="125" fill="#94a3b8">$</text>
    <text x="200" y="125" fill="#a78bfa">secure_by_default</text>
    <text x="345" y="125" fill="#475569">//</text>
    <text x="368" y="125" fill="#06b6d4">cloud_native</text>
    <text x="475" y="125" fill="#475569">//</text>
    <text x="498" y="125" fill="#22c55e">iac_first</text>
    <text x="575" y="125" fill="#475569">//</text>
    <text x="598" y="125" fill="#ec4899">ai_first</text>
  </g>

  <!-- Status row: ONLINE + handle -->
  <g transform="translate(450, 148)" font-family="'JetBrains Mono', 'Consolas', 'Menlo', 'Courier New', monospace" font-size="11">
    <circle cx="-70" cy="-3" r="4" fill="#22c55e"/>
    <circle cx="-70" cy="-3" r="7" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
    <text x="-58" y="0" fill="#22c55e">ONLINE</text>
    <text x="10" y="0" fill="#94a3b8">@mayurncrele</text>
  </g>
</svg>
