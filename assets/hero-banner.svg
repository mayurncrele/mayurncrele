<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mayur Rele — profile card">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="initials-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6d28d9"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="top-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="900" height="180" fill="url(#card-bg)"/>

  <!-- Left section: gradient block with initials -->
  <rect x="0" y="0" width="180" height="180" fill="url(#initials-bg)"/>
  <text x="90" y="118" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-4">MR</text>

  <!-- Top accent strip on right portion -->
  <rect x="180" y="0" width="720" height="2" fill="url(#top-accent)"/>

  <!-- Vertical dividers -->
  <line x1="180" y1="0" x2="180" y2="180" stroke="#1e293b" stroke-width="1"/>
  <line x1="640" y1="22" x2="640" y2="158" stroke="#312e81" stroke-width="1"/>

  <!-- Middle section: name + role -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <text x="210" y="70" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1">Mayur Rele</text>
    <text x="210" y="98" font-size="14" font-weight="600" fill="#a78bfa" letter-spacing="0.3">Senior Director  ·  IT &amp; Information Security</text>
    <text x="210" y="123" font-size="13" fill="#94a3b8">Parachute Health  ·  New Jersey / NYC</text>
  </g>

  <!-- Right section: credential stack -->
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
    <!-- IEEE -->
    <text x="665" y="48" font-size="11" font-weight="700" fill="#06b6d4" letter-spacing="2">★  IEEE</text>
    <text x="665" y="64" font-size="10" fill="#cbd5e1">Senior Member</text>

    <!-- Author -->
    <text x="665" y="93" font-size="11" font-weight="700" fill="#a78bfa" letter-spacing="2">◆  AUTHOR</text>
    <text x="665" y="109" font-size="10" fill="#cbd5e1">30+ Publications</text>

    <!-- Advisor -->
    <text x="665" y="138" font-size="11" font-weight="700" fill="#ec4899" letter-spacing="2">▲  ADVISOR</text>
    <text x="665" y="154" font-size="10" fill="#cbd5e1">Nightfall · EC-Council</text>
  </g>
</svg>
