<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Mayur Rele">
  <defs>
    <pattern id="hero-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="hero-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="hero-name" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#ec4899"/>
    </linearGradient>
    <filter id="hero-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="180" fill="url(#hero-bg)"/>
  <rect width="900" height="180" fill="url(#hero-grid)" opacity="0.55"/>

  <!-- Corner brackets: TL/BR cyan, TR/BL magenta -->
  <g stroke-width="2.5" fill="none" filter="url(#hero-glow)">
    <path d="M 25 25 L 75 25 M 25 25 L 25 75" stroke="#06b6d4"/>
    <path d="M 875 25 L 825 25 M 875 25 L 875 75" stroke="#ec4899"/>
    <path d="M 25 155 L 75 155 M 25 155 L 25 105" stroke="#ec4899"/>
    <path d="M 875 155 L 825 155 M 875 155 L 875 105" stroke="#06b6d4"/>
  </g>

  <!-- Name -->
  <text x="450" y="100" text-anchor="middle" font-family="'JetBrains Mono', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace" font-size="68" font-weight="800" fill="url(#hero-name)" filter="url(#hero-glow)" letter-spacing="6">MAYUR RELE</text>

  <!-- Underline -->
  <line x1="220" y1="120" x2="680" y2="120" stroke="#312e81" stroke-width="1"/>

  <!-- Subtitle -->
  <text x="450" y="148" text-anchor="middle" font-family="'JetBrains Mono', 'Consolas', 'Menlo', 'Monaco', 'Courier New', monospace" font-size="13" fill="#94a3b8" letter-spacing="2.5">SENIOR DIRECTOR  ·  IT &amp; INFORMATION SECURITY  ·  PARACHUTE HEALTH</text>
</svg>
